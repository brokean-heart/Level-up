<!DOCTYPE html>
<html>

<head>
    <title>Simple HTML Table</title>
</head>

<body>
    <h1>
        ROLLA
    </h1>
    <table border="1">
        <tr>
            <th>Firstname</th>
            <th>Lastname</th>
            <th>Age</th>
        </tr>
        <tr>
            <td>Lucas</td>
            <td>Rossi</td>
            <td>24</td>
        </tr>
        <tr>
            <td>Sophie</td>
            <td>Dubois</td>
            <td>32</td>
        </tr>
        <tr>
            <td>Sam</td>
            <td>Watson</td>
            <td>41</td>
        </tr>
    </table>
    <button>Click-Me</button>
    <style>
        body {
            background-color: aqua;
            margin: 0;
            font-size: 20px;
            padding: 20px;
            align-content: center;
            content-visibility: inherit;
        }

        h1 {
            color: black;
            text-align: center;
        }

        p {
            font-size: 18px;
            color: #555;
        }

        button {
            background-color: blueviolet;
            color: #000000;
            cursor: pointer;
            padding: 10px 20px;
        }

        button:hover {
            background-color: #2980b9;
        }
    </style>
</body>

</html>
